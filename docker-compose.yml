services:
  db:
    image: postgres:16-alpine
    container_name: cotime_db
    environment:
      POSTGRES_DB: cotime
      POSTGRES_USER: cotime_user
      POSTGRES_PASSWORD: cotime_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: cotime_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

volumes:
  postgres_data: